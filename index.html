<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Generator V2 - Edytor Komór</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .app-container { display: flex; gap: 20px; }
        .panel-ui { flex: 1; background: white; padding: 20px; border-radius: 8px; }
        .panel-cad { flex: 2; background: white; padding: 20px; border-radius: 8px; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 8px; width: 100%; margin-top: 5px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="panel-ui" id="controlPanel">
            <h2>Panel Sterowania</h2>
            <p>Kliknij w dowolną komorę na rysunku, aby ją edytować.</p>
        </div>
        <div class="panel-cad">
            <div id="svgWrapper"></div>
        </div>
    </div>

    <script>
        class SpaceNode {
            constructor(id, x, y, width, height) {
                this.id = id; this.x = x; this.y = y; this.width = width;
                this.height = height; this.splitType = null; this.children = [];
            }
            split(type, partsCount, thickness = 18) {
                this.splitType = type;
                if (type === 'H') {
                    let h = (this.height - ((partsCount - 1) * thickness)) / partsCount;
                    for (let i = 0; i < partsCount; i++) 
                        this.children.push(new SpaceNode(`${this.id}-H${i+1}`, this.x, this.y + i*(h + thickness), this.width, h));
                } else if (type === 'V') {
                    let w = (this.width - ((partsCount - 1) * thickness)) / partsCount;
                    for (let i = 0; i < partsCount; i++) 
                        this.children.push(new SpaceNode(`${this.id}-V${i+1}`, this.x + i*(w + thickness), this.y, w, this.height));
                }
            }
        }

        let rootNode = new SpaceNode('Szafa', 0, 0, 1200, 2460);
        rootNode.split('H', 2);
        rootNode.children[0].height = 460;
        rootNode.children[1].height = 2460 - 460 - 18;
        rootNode.children[1].y = 478;

        // Funkcja znajdująca komorę w "drzewie"
        function findNode(node, id) {
            if (node.id === id) return node;
            for (let child of node.children) {
                let found = findNode(child, id);
                if (found) return found;
            }
            return null;
        }

        function selectSpace(id) {
            let node = findNode(rootNode, id);
            let panel = document.getElementById('controlPanel');
            panel.innerHTML = `
                <h2>Edycja: ${id}</h2>
                <p>Szerokość: ${node.width.toFixed(1)} mm</p>
                <p>Wysokość: ${node.height.toFixed(1)} mm</p>
                <button class="btn-action" onclick="applySplit('${id}', 'H', 2)">Podziel Poziomo (Półki)</button>
                <button class="btn-action" onclick="applySplit('${id}', 'V', 2)">Podziel Pionowo (Przegroda)</button>
                <button class="btn-action" style="background:#d32f2f" onclick="location.reload()">Reset Szafy</button>
            `;
        }

        function applySplit(id, type, count) {
            let node = findNode(rootNode, id);
            node.split(type, count);
            renderCAD();
            selectSpace(id);
        }

        function drawRecursive(node) {
            let svg = '';
            if (node.children.length === 0) {
                svg += `<rect x="${node.x}" y="${node.y}" width="${node.width}" height="${node.height}" 
                        fill="#e8f0fe" stroke="#1F4E79" stroke-width="2" style="cursor:pointer;" 
                        onclick="selectSpace('${node.id}')" />`;
            } else {
                node.children.forEach(child => svg += drawRecursive(child));
                for (let i = 0; i < node.children.length - 1; i++) {
                    let c = node.children[i];
                    if (node.splitType === 'H') svg += `<rect x="${node.x}" y="${c.y + c.height}" width="${node.width}" height="18" fill="#2e7d32" />`;
                    else svg += `<rect x="${c.x + c.width}" y="${node.y}" width="18" height="${node.height}" fill="#2e7d32" />`;
                }
            }
            return svg;
        }

        function renderCAD() {
            document.getElementById('svgWrapper').innerHTML = 
                `<svg viewBox="-20 -20 1240 2500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">${drawRecursive(rootNode)}</svg>`;
        }
        renderCAD();
    </script>
</body>
</html>
