<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Stolarski 3D - Prototyp v1.0</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; display: flex; flex-wrap: wrap; gap: 20px; }
        
        /* Panel sterowania */
        .panel-left { flex: 1; min-width: 320px; max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* Przestrzeń robocza 3D */
        .panel-right { flex: 3; min-width: 400px; height: calc(100vh - 40px); background: #e8ebed; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center; }
        
        h2 { margin-top: 0; font-size: 1.2rem; color: #1F4E79; border-bottom: 2px solid #E2EFDA; padding-bottom: 8px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-top: 15px; margin-bottom: 5px; color: #555; }
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; background: #f9fbfd; }
        input:focus, select:focus { outline: none; border-color: #1F4E79; background: #fff; }
        
        #canvas-container { width: 100%; height: 100%; display: block; }
        
        .instructions { position: absolute; bottom: 15px; left: 15px; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 6px; font-size: 0.8rem; color: #333; pointer-events: none; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="panel-left">
        <h2>Parametry Korpusu 3D</h2>
        
        <label>Wysokość szafki (H) [mm]</label>
        <input type="number" id="hBox" value="720" min="100" oninput="updateCabinet()">
        
        <label>Szerokość szafki (W) [mm]</label>
        <input type="number" id="wBox" value="600" min="100" oninput="updateCabinet()">
        
        <label>Głębokość szafki (D) [mm]</label>
        <input type="number" id="dBox" value="510" min="100" oninput="updateCabinet()">
        
        <label>Grubość płyty (T) [mm]</label>
        <input type="number" id="tBoard" value="18" min="10" oninput="updateCabinet()">
        
        <label>Konstrukcja wieńców</label>
        <select id="kTyp" onchange="updateCabinet()">
            <option value="wpuszczane">Wpuszczane (między boki)</option>
            <option value="nakladane">Nakładane (na boki)</option>
        </select>
    </div>

    <div class="panel-right">
        <div id="canvas-container"></div>
        <div class="instructions">
            <b>Sterowanie:</b><br>
            • Lewy przycisk: Obrót (Orbit)<br>
            • Prawy przycisk: Przesunięcie (Pan)<br>
            • Kółko myszy: Przybliż/Oddal (Zoom)
        </div>
    </div>

    <script>
        // --- 1. USTAWIENIA BAZOWE THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f7f6); // Jasne, warsztatowe tło

        // Kamera
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
        // Ustawiamy kamerę tak, by patrzyła na szafkę z góry pod kątem (izometria)
        camera.position.set(1000, 1000, 1500); 

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Kontrolery (OrbitControls)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;

        // Światła
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Miękkie światło rozproszone
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(500, 1000, 500);
        scene.add(directionalLight);

        // Grupa trzymająca całą szafkę
        const cabinetGroup = new THREE.Group();
        scene.add(cabinetGroup);

        // --- 2. DEFINICJA MATERIAŁU TECHNICZNEGO ---
        // Półprzezroczysty materiał, aby widzieć kolizje i krawędzie
        const boardMaterial = new THREE.MeshLambertMaterial({ 
            color: 0x90caf9, 
            transparent: true, 
            opacity: 0.6,
            side: THREE.DoubleSide
        });
        
        // Funkcja pomocnicza: tworzy formatkę wraz z wyrysowanymi czarnymi/ciemnymi krawędziami
        function createBoard(w, h, d, x, y, z) {
            // Główna bryła
            const geometry = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geometry, boardMaterial);
            mesh.position.set(x, y, z);
            
            // Krawędzie (Wireframe) uwydatniające formatkę
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x153a5b, linewidth: 2 }));
            mesh.add(line); // Dodajemy krawędzie jako dziecko formatki
            
            return mesh;
        }

        // --- 3. LOGIKA BUDOWY SZAFKI ---
        function updateCabinet() {
            // Pobranie danych z formularza
            const H = parseFloat(document.getElementById('hBox').value) || 0;
            const W = parseFloat(document.getElementById('wBox').value) || 0;
            const D = parseFloat(document.getElementById('dBox').value) || 0;
            const T = parseFloat(document.getElementById('tBoard').value) || 0;
            const kTyp = document.getElementById('kTyp').value;

            // Czyszczenie poprzedniej szafki przed wygenerowaniem nowej
            while(cabinetGroup.children.length > 0){ 
                cabinetGroup.remove(cabinetGroup.children[0]); 
            }

            // Definicja zmiennych formatek
            let leftSide, rightSide, topPanel, bottomPanel;

            // Oś Y w Three.js rośnie w górę, środek ekranu to 0. 
            // Aby szafka stała na "ziemi", dół szafki ustawiamy od ZERA w górę.
            // X lewo/prawo. Z przód/tył.

            if (kTyp === 'wpuszczane') {
                // BOKI pełna wysokość, WIEŃCE wpuszczone między boki
                
                // Bok lewy
                leftSide = createBoard(T, H, D,  -W/2 + T/2,  H/2,  0);
                // Bok prawy
                rightSide = createBoard(T, H, D,  W/2 - T/2,  H/2,  0);
                
                // Wieniec dolny
                bottomPanel = createBoard(W - 2*T, T, D,  0,  T/2,  0);
                // Wieniec górny
                topPanel = createBoard(W - 2*T, T, D,  0,  H - T/2,  0);

            } else { // nakladane
                // WIEŃCE pełna szerokość, BOKI zamknięte między wieńcami
                
                // Wieniec dolny
                bottomPanel = createBoard(W, T, D,  0,  T/2,  0);
                // Wieniec górny
                topPanel = createBoard(W, T, D,  0,  H - T/2,  0);
                
                // Bok lewy
                leftSide = createBoard(T, H - 2*T, D,  -W/2 + T/2,  H/2,  0);
                // Bok prawy
                rightSide = createBoard(T, H - 2*T, D,  W/2 - T/2,  H/2,  0);
            }

            // Dodanie elementów do grupy szafki
            cabinetGroup.add(leftSide);
            cabinetGroup.add(rightSide);
            cabinetGroup.add(bottomPanel);
            cabinetGroup.add(topPanel);
        }

        // --- 4. PĘTLA ANIMACJI (RENDER) ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Wymagane dla gładkiego obracania
            renderer.render(scene, camera);
        }

        // Aktualizacja rozmiaru okna
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        // Start aplikacji
        updateCabinet();
        animate();

    </script>
</body>
</html>
