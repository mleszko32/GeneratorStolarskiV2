<!DOCTYPE html> 
<html lang="pl"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Generator Stolarski 2D & 3D Pro</title> 
    <style> 
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f6; padding: 20px; color: #333; margin: 0; } 
        .container { max-width: 98%; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; align-items: stretch; } 
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; } 
        .panel-left { flex: 1.2; min-width: 440px; max-width: 520px; } 
        .panel-right { flex: 2.5; min-width: 600px; position: sticky; top: 20px; align-self: flex-start; height: calc(100vh - 40px); display: flex; flex-direction: column; } 
        .panel-bottom { flex: 100%; width: 100%; margin-top: 10px; } 
         
        h2 { margin-top: 0; font-size: 1.2rem; color: #1F4E79; border-bottom: 2px solid #E2EFDA; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; } 
        h3 { font-size: 1rem; color: #555; margin-bottom: 10px; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px;} 
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-top: 10px; margin-bottom: 4px; color: #555; } 
        input[type="number"], input[type="text"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; background: #f9fbfd; } 
        input:focus, select:focus { outline: none; border-color: #1F4E79; background: #fff; } 
        input[readonly], input[disabled] { background: #f0f0f0; border-color: #ddd; color: #777; cursor: not-allowed; } 
         
        .view-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #e8f0fe; padding: 12px; border-radius: 6px; border-left: 4px solid #1F4E79; margin-bottom: 15px; } 
        .view-options label { margin: 0; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #1F4E79; } 
        .view-options input[type="checkbox"] { width: auto; accent-color: #1F4E79; transform: scale(1.2); margin:0; } 

        .space-row { background: #f9fbfd; padding: 10px 12px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #eee; transition: 0.2s; } 
        .space-row.locked { border-left: 4px solid #d32f2f; background: #fce8e8; } 
        .space-row.resultant { border-left: 4px solid #f57c00; background: #fff3e0; } 
        .space-row.drawer-active { border-left: 4px solid #2e7d32; background: #e8f5e9; } 
        .space-header { display: flex; justify-content: space-between; align-items: center; } 
        .space-row label.main-label { margin: 0; font-size: 0.9rem; color: #333; font-weight: bold; } 
        .space-input-group { display: flex; gap: 8px; align-items: center; } 
        .space-input-group input { width: 80px; text-align: center; font-weight: bold; padding: 6px; border: 1px solid #ccc; border-radius: 4px; } 
         
        .structural-divider { text-align: center; padding: 6px; background: #e2efda; border: 1px dashed #2e7d32; border-radius: 4px; margin-bottom: 8px; } 
        .structural-divider label { margin: 0; cursor: pointer; font-size: 0.8rem; color: #2e7d32; display: flex; justify-content: center; align-items: center; gap: 5px; } 

        .space-panel-inner { margin-top: 8px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .sp-header-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .sp-select-group { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 140px; }
        .sp-select-group span { font-size: 0.8rem; font-weight: bold; color: #1F4E79; white-space: nowrap; }
        .sp-select-group select { flex: 1; padding: 4px; font-size: 0.8rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; }

        .sp-settings-card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; margin-bottom: 8px; background: #fafafa; }
        .sp-settings-title { font-size: 0.75rem; font-weight: bold; color: #555; margin-bottom: 8px; display: block; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        
        .sp-grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 6px; }
        .sp-input-label { display: flex; flex-direction: column; font-size: 0.75rem; color: #333; gap: 3px; }
        .sp-input-label span { opacity: 0.8; }
        .sp-input-label input { width: 100%; padding: 4px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        .sp-drawer-item { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 6px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .sp-drawer-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
        .sp-drawer-row select { max-width: 150px; }
        
        .btn-small-outline { padding: 3px 6px; font-size: 0.75rem; background: #fff; border: 1px solid #1F4E79; color: #1F4E79; border-radius: 4px; cursor: pointer; transition: 0.2s; white-space: nowrap;}
        .btn-small-outline:hover { background: #e8f0fe; }

        button { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: #555; transition: 0.2s; } 
        button:hover:not([disabled]) { background: #f0f0f0; } 
         
        .lock-btn { width: 115px; } 
        .lock-btn.locked { background: #d32f2f; color: white; border-color: #b71c1c; } 
        .lock-btn.locked:hover { background: #b71c1c; } 
        .lock-btn[disabled] { opacity: 0.6; cursor: not-allowed; border-color: #f57c00; color: #e65100; background: #ffe0b2; } 
         
        .btn-primary { background: #1F4E79; color: white; border-color: #153a5b; padding: 10px 15px; width: 100%; font-size: 1rem; margin-top: 15px; } 
        .btn-primary:hover { background: #153a5b; } 
         
        .btn-print { background: #2e7d32; color: white; border-color: #1b5e20; } 
        .btn-print:hover { background: #1b5e20; } 
        
        /* Toggles for 2D/3D */
        .view-toggle-btn { background: #f0f0f0; border: 1px solid #ccc; color: #555; padding: 6px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .view-toggle-btn.active { background: #1F4E79; color: white; border-color: #153a5b; }
         
        .error-msg { display: none; background: #fce8e8; color: #d32f2f; font-weight: bold; padding: 10px; border-radius: 6px; border: 1px solid #d32f2f; margin-bottom: 15px; text-align: center; font-size: 0.9rem; } 
         
        .saved-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; } 
        .saved-item { background: #f9fbfd; border: 1px solid #ddd; padding: 15px; border-radius: 6px; border-left: 4px solid #f57c00; } 
        .saved-item h4 { margin: 0 0 10px 0; color: #1F4E79; } 
        .saved-item p { margin: 0 0 10px 0; font-size: 0.85rem; color: #555; } 
        .saved-actions { display: flex; gap: 10px; } 
        .btn-load { background: #e2efda; border-color: #2e7d32; color: #2e7d32; flex: 1; } 
        .btn-delete { background: #fce8e8; border-color: #d32f2f; color: #d32f2f; } 
 
        .svg-container { position: relative; overflow: hidden; background: #fafafa; border: 1px dashed #ccc; border-radius: 6px; flex: 1; min-height: 0; cursor: grab; display: flex; justify-content: center; align-items: center; margin-top: 15px; } 
        .svg-container:active { cursor: grabbing; } 
        .svg-wrapper { width: 100%; height: 100%; transform-origin: center center; transition: transform 0.05s linear; pointer-events: none; } 
        
        #canvas-container { position: relative; overflow: hidden; background: #e8ebed; border: 1px dashed #ccc; border-radius: 6px; flex: 1; min-height: 0; display: none; justify-content: center; align-items: center; margin-top: 15px; } 
        #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; outline: none; }

        #printArea { display: none; } 
         
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 20px 30px; border-radius: 8px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1F4E79; padding-bottom: 10px; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; border: none; padding: 0; }
        .btn-close { background: #d32f2f; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-close:hover { background: #b71c1c; }
         
        .cut-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; text-align: center; }
        .cut-table th { background: #e8f0fe; color: #1F4E79; padding: 10px; border: 1px solid #ddd; }
        .cut-table td { padding: 8px; border: 1px solid #ddd; color: #333; }
        .cut-table tr:nth-child(even) { background: #f9fbfd; }
        .table-group-header { background: #1F4E79 !important; color: white !important; font-weight: bold; text-align: left !important; }

        @media print { 
            body { background: white; margin: 0; padding: 0; } 
            .container { display: none !important; } 
            #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: white; } 
            #printArea svg { width: 100%; height: 100%; max-height: 98vh; } 
            @page { margin: 0.5cm; } 
        } 
 
        @media (max-width: 1024px) { 
            .panel-right { position: static !important; height: auto !important; align-self: stretch; min-width: 100%; } 
            .svg-container, #canvas-container { min-height: 500px; } 
        } 
    </style> 
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script> 
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head> 
<body> 
    <div class="container"> 
        <div class="panel panel-left"> 
            <h2>Opcje i Widoki</h2> 
            <div style="margin-bottom: 15px;">
                <button class="btn-primary" style="background:#2e7d32; border-color:#1b5e20;" onclick="showCutList()">📋 Wygeneruj Listę Formatek</button>
            </div>
             
            <div class="view-options"> 
                <label><input type="checkbox" id="sClearance" checked onchange="run()"> Światło (Wymiar)</label> 
                <label><input type="checkbox" id="sShelfAxis" checked onchange="run()"> Oś półki</label> 
                <label><input type="checkbox" id="sShelfHoles" checked onchange="run()"> Nawierty (Półki/Wieńce)</label> 
                <label><input type="checkbox" id="sDistances" checked onchange="run()"> Dystanse podpórek</label> 
                <label><input type="checkbox" id="sHingeAxis" checked onchange="run()"> Prowadnik (oś)</label> 
                <label><input type="checkbox" id="sHingeHoles" checked onchange="run()"> Prowadnik (otwory)</label> 
                <label><input type="checkbox" id="sFront" checked onchange="run()"> Rzut Frontu</label> 
                <label><input type="checkbox" id="sDrawerTopHoles" checked onchange="run()"> Szuflada - Otwór montażowy</label> 
                <label><input type="checkbox" id="sDrawerYDim" checked onchange="run()"> Szuflada - Rozstawy w poziomie (Y)</label> 
                <label style="color:#d32f2f; font-weight:bold; grid-column: span 2;"><input type="checkbox" id="rcMode" onchange="run()"> 🛠 RCSystem</label>
            </div> 
 
            <h3>Parametry Korpusu</h3> 
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"> 
                <div><label>Wysokość (H)</label><input type="number" id="hBox" value="2000" min="0" oninput="run()"></div> 
                <div><label>Szerokość (W)</label><input type="number" id="wBox" value="600" min="0" oninput="run()"></div> 
                <div><label>Głębokość boku (D)</label><input type="number" id="dBox" value="510" min="0" oninput="updateTotalDepth(); run();"></div> 
                <div><label>Głębokość całkowita</label><input type="number" id="totalDepth" value="531" min="0" oninput="updateDBoxFromTotal(); run();"></div> 
                <div><label>Ilość półek</label><input type="number" id="qPol" value="4" min="0" oninput="run()"></div> 
                <div><label>Typ korpusu</label> 
                    <select id="kTyp" onchange="run()"> 
                        <option value="wpuszczane">Wpuszczane</option> 
                        <option value="nakladane">Nakładane</option> 
                    </select> 
                </div> 
                <div><label>Wysokość cokołu</label><input type="number" id="cokol" value="100" min="0" oninput="run()"></div> 
                <div><label>Offset podpórki (Dół)</label><input type="number" id="offsetPodporki" value="3" oninput="run()"></div> 
                <div><label>Luz boczny półki</label><input type="number" id="luzBocznyPolki" value="0" min="0" oninput="run()"></div>
                <div><label>Grubość płyty (korpus)</label><input type="number" id="tBoard" value="18" min="0" oninput="run()"></div> 
                <div><label>Konstrukcja pleców</label> 
                    <select id="backType" onchange="toggleBackFields(); updateTotalDepth(); run();"> 
                        <option value="nakladane">Nakładane od tyłu</option> 
                        <option value="nut">Wpuszczane w nut</option> 
                    </select> 
                </div>
                <div><label>Grubość pleców (mm)</label><input type="number" id="grPlecy" value="3" min="0" oninput="updateTotalDepth(); run();"></div>
               <div id="nutDepthField" style="display:none; grid-column: span 2; background: #e8f0fe; padding: 12px; border-radius: 6px; border-left: 4px solid #1F4E79;">
    <label style="margin-top:0; border-bottom: 1px solid #b3cce6; padding-bottom: 4px; color: #1F4E79;">Parametry Nuta (Wpuszczenia)</label>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top: 8px;">
        <div>
            <label style="margin-top:0;">Odsunięcie od tyłu (mm)</label>
            <input type="number" id="nutPosition" value="20" min="0" oninput="run()">
        </div>
        <div>
            <label style="margin-top:0;">Głębokość frezu w płycie (mm)</label>
            <input type="number" id="nutGroove" value="8" min="0" oninput="run()">
        </div>
    </div>
    <div style="display:flex; gap:15px; margin-top:10px;">
        <label style="margin:0; font-weight:normal; font-size:0.85rem; display:flex; align-items:center; gap:5px; cursor:pointer;">
            <input type="checkbox" id="nutBottomCheck" checked onchange="run()" style="width:auto; margin:0;"> Frez w dnie
        </label>
        <label style="margin:0; font-weight:normal; font-size:0.85rem; display:flex; align-items:center; gap:5px; cursor:pointer;">
            <input type="checkbox" id="nutTopCheck" checked onchange="run()" style="width:auto; margin:0;"> Frez w wieńcu górnym
        </label>
    </div>
</div>
            </div> 
 
            <h3>Fronty (Główne domyślne nałożenia)</h3> 
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"> 
                <div> 
                    <label style="display:flex; justify-content:space-between; align-items:center;"> 
                        Ilość zaw. / drzwi 
                        <span style="font-weight:normal; font-size:0.8rem; display:flex; align-items:center; gap:4px; color:#1F4E79; cursor:pointer;"> 
                            <input type="checkbox" id="autoZaw" checked onchange="toggleAutoZaw()" style="width:auto; margin:0; cursor:pointer;"> Auto 
                        </span> 
                    </label> 
                    <input type="number" id="qZaw" value="4" min="0" max="8" disabled oninput="run()"> 
                </div> 
                <div><label>Strefa ochrony zawiasu</label><input type="number" id="cMargin" value="35" min="0" oninput="run()"></div> 
                <div><label>Puszka (od dołu drzwi)</label><input type="number" id="zOffD" value="100" min="0" oninput="run()"></div> 
                <div><label>Puszka (od góry drzwi)</label><input type="number" id="zOffG" value="100" min="0" oninput="run()"></div> 
                
                <div><label>Nałożenie - Góra (Top)</label><input type="number" id="nTop" value="13" step="0.5" oninput="run()"></div> 
                <div><label>Nałożenie - Dół (Bottom)</label><input type="number" id="nBottom" value="18" step="0.5" oninput="run()"></div> 
                <div><label>Nałożenie - Lewo (Left)</label><input type="number" id="nLeft" value="16.5" step="0.5" oninput="run()"></div> 
                <div><label>Nałożenie - Prawo (Right)</label><input type="number" id="nRight" value="16.5" step="0.5" oninput="run()"></div> 
                <div style="grid-column: span 2;"><label>Nałożenie - Wewnętrzne (Półki/Styki)</label><input type="number" id="nWewnetrzne" value="7.5" step="0.5" oninput="run()"></div> 
                 
                <div style="grid-column: span 2;"> 
                    <label>System prowadnic szuflad</label> 
                    <select id="drawerSystem" onchange="updateDrawerFields(); updateAllDrawersToDefault(); run();"> 
                        <option value="44">GTV Axis Pro(Dno 16mm)</option> 
                        <option value="44_18">GTV Axis Pro(Dno 18mm)</option> 
                        <option value="54">Blum Merivobox</option> 
                        <option value="33">Blum Antaro / Tandembox</option> 
                        <option value="custom">Inne</option> 
                    </select> 
                </div> 
                <div id="customDrawerField" style="grid-column: span 2; display:none;"> 
                    <label>Własna wysokość otworu górnego (mm)</label> 
                    <input type="number" id="customDrawerAxis" value="44" min="0" oninput="run()"> 
                </div> 
            </div> 
 
            <h3>Manager Przestrzeni</h3> 
            <div id="errorBox" class="error-msg"></div> 
            <div id="spaceControls"></div> 
 
            <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;"> 
            <label>Nazwa do zapisu projektu:</label> 
            <input type="text" id="cabName" value="Szafka z szufladami i półkami" placeholder="np. Szafka kuchenna lewa"> 
            <div style="display: flex; gap: 10px;"> 
                <button class="btn-primary" onclick="saveCabinet()">💾 Zapisz jako nowy</button> 
                <button id="btnUpdate" class="btn-primary" style="display: none; background: #f57c00; border-color: #e65100;" onclick="updateCabinet()">🔄 Aktualizuj wczytany</button> 
            </div> 
        </div> 
         
        <div class="panel panel-right"> 
            <h2> 
                Podgląd Projektu
                <div style="display:flex; gap: 5px; align-items:center;">
                    <button id="btnView2D" class="view-toggle-btn active" onclick="switchView('2D')">Wykres 2D</button>
                    <button id="btnView3D" class="view-toggle-btn" onclick="switchView('3D')">Model 3D</button>
                </div>
            </h2> 
            
            <div id="toolbar2D" style="display:flex; gap: 5px; align-items:center; margin-bottom: 5px; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #eee;"> 
                <select id="printType" style="width:auto; padding:5px; font-size:0.85rem; margin-right:5px;"> 
                    <option value="all">Drukuj: Wszystko</option> 
                    <option value="interior">Drukuj: Tylko Wnętrze</option> 
                    <option value="side">Drukuj: Tylko Bok</option> 
                    <option value="front">Drukuj: Tylko Front</option> 
                </select> 
                <button class="btn-print" onclick="printView()">🖨️ Drukuj</button> 
                <span style="color:#ddd; margin: 0 5px;">|</span> 
                <button onclick="resetZoom()">⟲ Reset</button> 
                <button onclick="zoomManual(0.2)">+</button> 
                <button onclick="zoomManual(-0.2)">-</button> 
            </div> 

            <div id="svgContainer" class="svg-container"> 
                <div id="svgWrapper" class="svg-wrapper"></div> 
            </div> 
            
            <div id="canvas-container"></div>
        </div> 
    </div> 
 
    <div class="container" style="margin-top: 20px;"> 
        <div class="panel panel-bottom"> 
            <h2>Baza zapisanych projektów</h2> 
            <div id="savedList" class="saved-list"></div> 
        </div> 
    </div> 
    <div id="cutListModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Lista Formatek</h2>
                <button class="btn-close" onclick="closeCutList()">Zamknij (X)</button>
            </div>
            <div id="cutListContainer"></div>
        </div>
    </div>

        // ---------------- INICJALIZACJA 3D (THREE.JS) ---------------- //
        function init3D() {
            const container = document.getElementById('canvas-container');
            if(container.clientWidth === 0) return; // Jeśli kontener jest ukryty i ma szerokość 0, nie inicjalizuj

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe8ebed);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
            camera.position.set(800, 1000, 1500);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 500, 0);
            controls.enableDamping = true;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(500, 1000, 800);
            scene.add(dirLight);

            scene.add(new THREE.GridHelper(2000, 20, 0xcccccc, 0xdddddd));
            
            cabinetGroup = new THREE.Group();
            scene.add(cabinetGroup);

            is3DInitialized = true;
            animate3D();

            window.addEventListener('resize', () => { 
                if(container.clientWidth > 0 && container.clientHeight > 0) {
                    renderer.setSize(container.clientWidth, container.clientHeight); 
                    camera.aspect = container.clientWidth / container.clientHeight; 
                    camera.updateProjectionMatrix(); 
                }
            });
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function update3DScene() {
            if(!is3DInitialized || !cabinetGroup) return;

            while(cabinetGroup.children.length > 0) cabinetGroup.remove(cabinetGroup.children[0]); 

            let wBox = val('wBox'); let hBox = val('hBox'); let dBox = val('dBox'); let tBoard = val('tBoard');
            let cokol = val('cokol'); let kTyp = document.getElementById('kTyp').value;
            let backType = document.getElementById('backType').value; let grPlecy = val('grPlecy');
            
            let nutDepthVal = val('nutDepth'); 
            let nutGroove = val('nutGroove');
            let nutBottom = isChecked('nutBottomCheck');
            let nutTop = isChecked('nutTopCheck');
            const LUZ_NUT = 2;

            const matKorpus = new THREE.MeshLambertMaterial({ color: 0x90caf9, transparent: true, opacity: 0.6 });
            const matFront = new THREE.MeshLambertMaterial({ color: 0xa8e6cf, transparent: true, opacity: 0.85 });
            const matPolka = new THREE.MeshLambertMaterial({ color: 0xffd3b6, transparent: true, opacity: 0.75 });
            const matHDF = new THREE.MeshLambertMaterial({ color: 0xffcc80, transparent: true, opacity: 0.5 });
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x153a5b, linewidth: 1 });

            function addPart(w, h, d, x, y, z, mat) {
                const geom = new THREE.BoxGeometry(w, Math.max(h, 0.1), Math.max(d, 0.1));
                const mesh = new THREE.Mesh(geom, mat);
                const edges = new THREE.EdgesGeometry(geom);
                mesh.add(new THREE.LineSegments(edges, edgeMat));
                mesh.position.set(x, y, z);
                cabinetGroup.add(mesh);
            }

            let sideBot = (kTyp === 'nakladane') ? cokol + tBoard : 0;
            let sideTop = (kTyp === 'nakladane') ? hBox - tBoard : hBox;
            let sideH = sideTop - sideBot;

            // Boki
            addPart(tBoard, sideH, dBox, -wBox/2 + tBoard/2, sideBot + sideH/2, dBox/2, matKorpus); 
            addPart(tBoard, sideH, dBox, wBox/2 - tBoard/2, sideBot + sideH/2, dBox/2, matKorpus);

            // Wieńce - z uwzględnieniem skracania
            let wWieniec = (kTyp === 'nakladane') ? wBox : wBox - 2*tBoard;
            
            let dDno = (backType === 'nut' && !nutBottom) ? (dBox - nutDepthVal - grPlecy) : dBox;
            let zDno = dBox - dDno/2; // Zrównane do frontu
            addPart(wWieniec, tBoard, dDno, 0, cokol + tBoard/2, zDno, matKorpus); 
            
            let dGora = (backType === 'nut' && !nutTop) ? (dBox - nutDepthVal - grPlecy) : dBox;
            let zGora = dBox - dGora/2;
            addPart(wWieniec, tBoard, dGora, 0, hBox - tBoard/2, zGora, matKorpus); 

            if(cokol > 0) addPart(wBox, cokol, tBoard, 0, cokol/2, dBox - tBoard/2, matKorpus);

            // Plecy (HDF)
            let backW = wBox; let backH = hBox; let backZ = -grPlecy/2; let backY = sideBot + sideH/2;

            if (backType === 'nut') {
    backW = wBox - 2*tBoard + 2*nutGroove - 2*LUZ_NUT;
    
    let bBottom = sideBot;
    let bTop = sideTop;
    
    if (nutBottom) {
        bBottom += tBoard - (nutGroove - LUZ_NUT);
    } else {
        bBottom += 2; // Odsunięcie od krawędzi dołu o 2mm
    }
    
    if (nutTop) {
        bTop -= tBoard - (nutGroove - LUZ_NUT);
    } else {
        bTop -= 2; // Odsunięcie od krawędzi góry o 2mm
    }
    
    backH = bTop - bBottom;
    backY = bBottom + backH/2;
    backZ = nutDepthVal + grPlecy/2; 
} else {
                backH = sideH; backY = sideBot + sideH/2;
            }
            addPart(backW, backH, grPlecy, 0, backY, backZ, matHDF);

            // Półki (Spłycone)
            if (window.lastOsie && window.lastOsie.length > 0) {
                window.lastOsie.forEach(osData => {
                    let yCenter = osData.spod + tBoard/2; 
                    let shelfBackZ = (backType === 'nut') ? (nutDepthVal + 1) : 0;
                    let shelfFrontZ = dBox - 5; 
                    let pDepth = Math.max(shelfFrontZ - shelfBackZ, 10); 
                    let pZCenter = shelfBackZ + pDepth/2;
                    addPart(wBox - 2*tBoard, tBoard, pDepth, 0, yCenter, pZCenter, matPolka);
                });
            }

            // Fronty
            if (window.lastFrontBlocks && window.lastFrontBlocks.length > 0) {
                window.lastFrontBlocks.forEach(fb => {
                    if (fb.layout === 'none') return;
                    let fW_full = (wBox - 2*tBoard) + fb.nL + fb.nR;
                    let leftX = -wBox/2 + tBoard - fb.nL;

                    let drawFrontRect = (fH, fYStart, layout) => {
                        let wFront = fW_full; let cx = leftX + wFront/2;
                        if(layout === 'left' || layout === 'right' || layout === 'double') wFront = (fW_full - fb.gap)/2;
                        if(layout === 'left') cx = leftX + wFront/2;
                        if(layout === 'right') cx = leftX + wFront + fb.gap + wFront/2;
                        let frontZ = dBox + 18/2; 

                        if(layout === 'double') {
                            addPart(wFront, fH, 18, leftX + wFront/2, fYStart + fH/2, frontZ, matFront); 
                            addPart(wFront, fH, 18, leftX + wFront + fb.gap + wFront/2, fYStart + fH/2, frontZ, matFront); 
                        } else addPart(wFront, fH, 18, cx, fYStart + fH/2, frontZ, matFront);
                    };

                    if(fb.type === 'door') drawFrontRect(fb.yEnd - fb.yStart, fb.yStart, fb.layout);
                    else if(fb.type === 'drawers' && fb.drawers) fb.drawers.forEach(dr => drawFrontRect(dr.yEnd - dr.yStart, dr.yStart, fb.layout));
                });
            }
        }

        function initZoomPan() { 
            const container = document.getElementById('svgContainer'); 
            container.addEventListener('wheel', (e) => { 
                e.preventDefault(); 
                zScale *= Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1); 
                zScale = Math.min(Math.max(0.1, zScale), 10);  
                applyTransform(); 
            }); 
            container.addEventListener('mousedown', (e) => { 
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return; 
                isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; 
            }); 
            window.addEventListener('mousemove', (e) => { 
                if (!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; applyTransform(); 
            }); 
            window.addEventListener('mouseup', () => { isDragging = false; }); 
            container.addEventListener('mouseleave', () => { isDragging = false; }); 
        } 
 
        function zoomManual(amount) { zScale = Math.min(Math.max(0.1, zScale + amount), 10); applyTransform(); } 
        function resetZoom() { zScale = 1; panX = 0; panY = 0; applyTransform(); } 
        function applyTransform() { document.getElementById('svgWrapper').style.transform = `translate(${panX}px, ${panY}px) scale(${zScale})`; }

            spaceLocks.forEach(space => {

                    space.manualFronts.forEach(mf => { 
                        mf.type = dbSys.default; 
                        let newTypeObj = dbSys.types.find(t => t.id === mf.type); 
                        if(mf.height < newTypeObj.minFront) mf.height = newTypeObj.minFront; 
                    }); 
                } 
            }); 
        }

        function loadCabinet(docId) { 
            let cab = cloudCabinets.find(c => c.docId === docId); 
            if(!cab) return; 
            document.getElementById('cabName').value = cab.name; document.getElementById('kTyp').value = cab.kTyp; 
            ['hBox','wBox','dBox','qPol','tBoard','offsetPodporki','qZaw','zOffD','zOffG'].forEach(id => { document.getElementById(id).value = cab[id]; }); 
            document.getElementById('cokol').value = cab.cokol !== undefined ? cab.cokol : 100; 
            document.getElementById('autoZaw').checked = cab.autoZaw !== undefined ? cab.autoZaw : true; 
            document.getElementById('luzBocznyPolki').value = cab.luzBocznyPolki !== undefined ? cab.luzBocznyPolki : 1;
            document.getElementById('qZaw').disabled = document.getElementById('autoZaw').checked; 
            document.getElementById('cMargin').value = cab.cMargin !== undefined ? cab.cMargin : 35; 
            
            let defaultOuter = cab.nSkrajne !== undefined ? cab.nSkrajne : (cab.fLuzD !== undefined ? (cab.tBoard - cab.fLuzD) : 15);
            document.getElementById('nTop').value = cab.nTop !== undefined ? cab.nTop : defaultOuter;
            document.getElementById('nBottom').value = cab.nBottom !== undefined ? cab.nBottom : defaultOuter;
            document.getElementById('nLeft').value = cab.nLeft !== undefined ? cab.nLeft : defaultOuter;
            document.getElementById('nRight').value = cab.nRight !== undefined ? cab.nRight : defaultOuter;
            document.getElementById('nWewnetrzne').value = cab.nWewnetrzne !== undefined ? cab.nWewnetrzne : (cab.luzFrontow !== undefined ? (cab.tBoard - cab.luzFrontow)/2 : 8);
            
            document.getElementById('backType').value = cab.backType !== undefined ? cab.backType : 'nakladane'; 
            document.getElementById('grPlecy').value = cab.grPlecy !== undefined ? cab.grPlecy : 3;
            // Wczytywanie parametrów Nuta
document.getElementById('nutPosition').value = cab.nutPosition !== undefined ? cab.nutPosition : 20; 
document.getElementById('nutGroove').value = cab.nutGroove !== undefined ? cab.nutGroove : 8; 
document.getElementById('nutBottomCheck').checked = cab.nutBottomCheck !== undefined ? cab.nutBottomCheck : true;
document.getElementById('nutTopCheck').checked = cab.nutTopCheck !== undefined ? cab.nutTopCheck : true;
            toggleBackFields(); 
            let loadedSys = cab.drawerSystem !== undefined ? cab.drawerSystem : "44"; 
            document.getElementById('drawerSystem').value = loadedSys; 
            document.getElementById('customDrawerAxis').value = cab.customDrawerAxis !== undefined ? cab.customDrawerAxis : 44; 
            updateDrawerFields(); 
            let sysObj = DRAWER_DB[loadedSys]; 
 
            spaceLocks = cab.spaceLocks.map(s => { 
                let mFronts = s.manualFronts || [200, 200, 200]; 
                mFronts = mFronts.map(f => { 
                    if (typeof f === 'number') return { height: f, type: sysObj.default }; 
                    return { height: f.height, type: f.type || sysObj.default }; 
                }); 
                return { 
                    locked: s.locked || false, manualVal: s.manualVal || 0, currentVal: s.currentVal || 0, 
                    hasDrawers: s.hasDrawers || false, frontType: s.frontType || (s.hasDrawers ? 'drawers' : 'merged'),
                    frontLayout: s.frontLayout || 'full', drawerMode: s.drawerMode || 'auto', qDrawers: s.qDrawers || 3, 
                    manualFronts: mFronts, topGapToAxis: s.topGapToAxis !== undefined ? s.topGapToAxis : 12,
                    gapTop: s.gapTop || 0, gapBottom: s.gapBottom || 0,
                    nT: s.nT, nB: s.nB, nL: s.nL, nR: s.nR, gap: s.gap, 
                    manualDrawerNL: s.manualDrawerNL || {} 
                }; 
            }); 
            structuralShelves = cab.structuralShelves || new Array(val('qPol')).fill(false); 
            currentLoadedDocId = docId; document.getElementById('btnUpdate').style.display = 'block'; 
            updateTotalDepth();
            run(); window.scrollTo(0, 0);

        function toggleLock(index) { 
            hideError(); 
            if(spaceLocks[index].locked) spaceLocks[index].locked = false; 
            else { 
                if (spaceLocks.filter(s => s.locked).length >= spaceLocks.length - 1) { showError("Zostaw min. 1 wymiar auto."); return; } 
                spaceLocks[index].locked = true; spaceLocks[index].manualVal = spaceLocks[index].currentVal; 
            } 
            run(); 
        } 
         
        function changeFrontType(index, type) { 
            if (type === 'drawers') { spaceLocks[index].hasDrawers = true; spaceLocks[index].frontType = 'drawers'; } 
            else { spaceLocks[index].hasDrawers = false; spaceLocks[index].frontType = type; } 
            run(); 
        }
        function changeFrontLayout(index, layout) { spaceLocks[index].frontLayout = layout; run(); }
        function toggleStructural(index) { structuralShelves[index] = !structuralShelves[index]; run(); } 
        function changeDrawerMode(index, mode) { 
            spaceLocks[index].drawerMode = mode;

                if (cokol > 0) svg += `<line x1="${sXBok - 30}" y1="${hBox}" x2="${sXBok - 30}" y2="${hBox - cokol}" stroke="#1F4E79" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/><text x="${sXBok - 40}" y="${hBox - cokol/2 + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Cokół: ${cokol}</text>`; 
                let svgOsWd = hBox - (cokol + tBoard / 2); svg += `<line x1="${sXBok - 130}" y1="${svgOsWd}" x2="${sXBok}" y2="${svgOsWd}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/><text x="${sXBok - 140}" y="${svgOsWd + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś wieńca: ${Math.round(cokol + tBoard / 2 - sideBottom)}</text>`; 
                let topCab = subCabinets[subCabinets.length - 1];
                let svgOsWg = hBox - topCab.endY - topCab.visualGap + tBoard / 2; svg += `<line x1="${sXBok - 130}" y1="${svgOsWg}" x2="${sXBok}" y2="${svgOsWg}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/><text x="${sXBok - 140}" y="${svgOsWg + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś wieńca: ${Math.round(topCab.endY - tBoard / 2 - topCab.localZero)}</text>`; 
                if (sShelfHoles) { svg += drawStructuralHoles(svgOsWd); svg += drawStructuralHoles(svgOsWg); } 
            } 
 
            osie.forEach((data, i) => { 
                let ySpodSVG = hBox - data.spod - data.visualGap; let isStruct = data.isStruct; 
                svg += `<rect x="${sXBok}" y="${ySpodSVG - tBoard}" width="${dBox}" height="${tBoard}" fill="${isStruct ? "#2e7d32" : "#2F5597"}" opacity="${isStruct ? "0.25" : "0.15"}"/>`; 
                 
                let yOsPolkiSVG = hBox - (data.spod + tBoard / 2) - data.visualGap; 
                if (sShelfAxis) { svg += `<line x1="${sXBok - 130}" y1="${yOsPolkiSVG}" x2="${sXBok}" y2="${yOsPolkiSVG}" stroke="#1F4E79" stroke-dasharray="6,6" stroke-width="2"/><text x="${sXBok - 140}" y="${yOsPolkiSVG + 8}" font-size="${fontL}" font-weight="bold" fill="#1F4E79" text-anchor="end">Oś: ${Math.round(data.spod + tBoard / 2 - data.localZero)}</text>`; } 
                 
                if (sShelfHoles) { 
                    if (isStruct) svg += drawStructuralHoles(yOsPolkiSVG); 
                    else [-32, 0, 32].forEach(offset => { 
                        let drillY = hBox - (data.os + offset) - data.visualGap; let isCenter = offset === 0; let color = isCenter ? "#e65100" : "#ffb74d"; 
                        let cab = subCabinets.find(c => c.visualGap === data.visualGap);
                        let absDist = Math.round(data.os + offset - data.localZero);
                        let topDist = Math.round(cab.endY - (data.os + offset));
                        let txtDisplay = `${absDist}`;
                        if (rcMode) txtDisplay += ` [Rc: ${absDist - 32}]`;
                        txtDisplay += ` (${topDist})`;
                        svg += `<circle cx="${hFrontX}" cy="${drillY}" r="${isCenter ? 5 : 4}" fill="${color}"/><circle cx="${hBackX}" cy="${drillY}" r="${isCenter ? 5 : 4}" fill="${color}"/><line x1="${hFrontX}" y1="${drillY}" x2="${laneShelfHoles - 10}" y2="${drillY}" stroke="${color}" stroke-dasharray="4,4" stroke-width="1.5"/><text x="${laneShelfHoles}" y="${drillY + 8}" font-size="${isCenter ? fontL : fontM}" font-weight="${isCenter ? "bold" : "normal"}" fill="${color}" text-anchor="start">${txtDisplay}</text>`; 
                    }); 
                } 
                 
                if (sDistances && !isStruct) { 
                    let isFirst = (i === 0 || structuralShelves[i-1]);
                    let yPrevHoleSVG = isFirst ? (hBox - data.localZero - data.visualGap) : (hBox - osie[i-1].os - osie[i-1].visualGap); 
                    let yCurrHoleSVG = hBox - data.os - data.visualGap; 
                    let actualDist = Math.abs(Math.round(yPrevHoleSVG - yCurrHoleSVG));
                    let freeDimLineX = hFrontX - 35; 
                     
                    svg += `<line x1="${freeDimLineX}" y1="${yPrevHoleSVG}" x2="${freeDimLineX}" y2="${yCurrHoleSVG}" stroke="#e65100" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>`; 
                    
                    let rcOffset = isFirst ? 32 : 34.5;
                    let displayTxt = actualDist;
                    let boxW = 50;
                    let fSize = fontS;
                    if (rcMode) {
                        displayTxt = `${actualDist} (M:${actualDist - rcOffset})`;
                        boxW = 125;
                        fSize = fontS - 4;
                    }
                    svg += `<rect x="${freeDimLineX - boxW/2}" y="${(yPrevHoleSVG + yCurrHoleSVG)/2 - 14}" width="${boxW}" height="28" fill="#ffffff" stroke="#e65100" stroke-width="1" rx="4"/>`; 
                    svg += `<text x="${freeDimLineX}" y="${(yPrevHoleSVG + yCurrHoleSVG)/2 + 7}" font-size="${fSize}" font-weight="bold" fill="#e65100" text-anchor="middle">${displayTxt}</text>`; 
                } 
            }); 
            
            let currentFloorSVG = hBox - sideBottom;
            for(let i = 0; i < totalSpaces; i++) {
                let sb = spacesBoundary[i];
                let isFirst = i === 0 || sb.isSplit;
                if (isFirst) currentFloorSVG = hBox - sb.localZero - sb.visualGap;
                
                let ySpodSVG = hBox - sb.yEnd - sb.visualGap;
                let shelfColor = structuralShelves[i] ? "#2e7d32" : "#2F5597"; 
                svg += `<rect x="${innerX}" y="${ySpodSVG - tBoard}" width="${innerW}" height="${tBoard}" fill="${shelfColor}" opacity="0.4" stroke="#1F4E79" stroke-width="2"/>`; 
                
                if (sClearance && sb.yEnd > sb.yStart) { 
                    let isLocked = spaceLocks[i].locked; let strokeColor = isLocked ? "#d32f2f" : "#555"; let arrow = isLocked ? "url(#arrow-red)" : "url(#arrow)"; 
                    svg += `<line x1="${centerX}" y1="${ySpodSVG}" x2="${centerX}" y2="${currentFloorSVG}" stroke="${strokeColor}" stroke-width="3" marker-start="${arrow}" marker-end="${arrow}"/><rect x="${centerX - 40}" y="${(currentFloorSVG + ySpodSVG)/2 - 20}" width="80" height="40" fill="#fff" opacity="0.9" rx="6"/><text x="${centerX}" y="${(currentFloorSVG + ySpodSVG)/2 + fontM/3}" font-size="${fontM}" font-weight="bold" fill="${strokeColor}" text-anchor="middle">${spaceLocks[i].currentVal}</text>`; 
                    if(isLocked) svg += `<text x="${centerX + 50}" y="${(currentFloorSVG + ySpodSVG)/2 + fontM/3}" font-size="${fontM}" fill="#d32f2f">🔒</text>`; 
                } 
                currentFloorSVG = ySpodSVG - tBoard;  
            }
 
            drawerGuides.forEach((dg) => { 
                let yT = hBox - dg.axisYTop - dg.visualGap; 
                 
                if (sDrawerTopHoles) { 
                    svg += `<rect x="${laneHingeAxis}" y="${yT - 20}" width="420" height="38" fill="#f0f4f8" stroke="#1F4E79" stroke-width="1.5" rx="6"/>`; 
                    
                    let valAbs = Math.round(dg.axisYTop - dg.localZero);
                    let txtDisplay = `Oś prowadnicy: ${valAbs}`;
                    if (rcMode) txtDisplay += ` [M: ${valAbs - 32}]`;
                    txtDisplay += ` [NL: ${dg.currentNL}]`;
                    svg += `<text x="${laneHingeAxis + 15}" y="${yT + 7}" font-size="${fontM}" font-weight="bold" fill="#1F4E79" text-anchor="start">${txtDisplay}</text>`; 
                     
                    let holesArray = sysDB.yHolesMap[dg.currentNL] || []; 
                    let firstHoleX = sXBok + dBox - 37; 
                    svg += `<circle cx="${firstHoleX}" cy="${yT}" r="4.5" fill="#1F4E79" stroke="#1F4E79" stroke-width="1.5"/>`; 
                     
                    if (sDrawerYDim) { 
                        svg += `<line x1="${sXBok + dBox}" y1="${yT - 25}" x2="${firstHoleX}" y2="${yT - 25}" stroke="#e53e3e" stroke-width="1.2" marker-end="url(#arrow-red)" marker-start="url(#arrow-red)"/>`; 
                        svg += `<text x="${firstHoleX + 18}" y="${yT - 33}" font-size="${fontS}" font-weight="bold" fill="#e53e3e" text-anchor="middle">37</text>`; 
                    } 
                    let prevHoleX = firstHoleX; 
                    holesArray.forEach((step) => { 
                        let holeX = firstHoleX - step; 
                        svg += `<circle cx="${holeX}" cy="${yT}" r="4.5" fill="#1F4E79" stroke="#1F4E79" stroke-width="1.5"/>`; 
                        if (sDrawerYDim) { 
                            svg += `<line x1="${prevHoleX}" y1="${yT - 25}" x2="${holeX}" y2="${yT - 25}" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>`; 
                            svg += `<text x="${(prevHoleX + holeX)/2}" y="${yT - 33}" font-size="${fontS}" font-weight="bold" fill="#1F4E79" text-anchor="middle">${step}</text>`; 
                        } 
                        prevHoleX = holeX; 
                    }); 
                } 
            }); 
 
            if ((sHingeAxis || sHingeHoles) && (isAutoZaw || globalQZaw > 0)) { 
                doorZawiasy.forEach(zaw => { 
                    let drillY = hBox - zaw.bodyY - zaw.visualGap; let color = zaw.shifted ? "#9c27b0" : "#0288d1";  
                    let valAbs = Math.round(zaw.bodyY - zaw.localZero);
                    let cab = subCabinets.find(c => c.visualGap === zaw.visualGap);
                    let topAbs = Math.round(cab.endY - zaw.bodyY);
                    let txtDisplay = `Prowadnik: ${valAbs}`;
                    if (rcMode) txtDisplay += ` [M: ${valAbs - 32}]`;
                    txtDisplay += ` (${topAbs})${zaw.shifted ? " [KOREKTA]" : ""}`;
                    if (sHingeAxis) svg += `<line x1="${hFrontX - 20}" y1="${drillY}" x2="${laneHingeAxis - 10}" y2="${drillY}" stroke="${color}" stroke-dasharray="2,2" stroke-width="2"/><text x="${laneHingeAxis}" y="${drillY + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${txtDisplay}</text>`; 
                    if (sHingeHoles) [-16, 16].forEach(off => { 
                        let hy = hBox - (zaw.bodyY + off) - zaw.visualGap; 
                        svg += `<circle cx="${hFrontX}" cy="${hy}" r="4" fill="${color}"/><line x1="${hFrontX}" y1="${hy}" x2="${laneHingeHoles - 10}" y2="${hy}" stroke="${color}" stroke-dasharray="1,2" stroke-width="1.5"/><text x="${laneHingeHoles}" y="${hy + 8}" font-size="${fontM}" fill="${color}" text-anchor="start">${Math.round(zaw.bodyY + off - zaw.localZero)}</text>`; 
                    }); 
                }); 
            } 
 
            if (sFront) { 
                svg += `<text x="${sXFront + wBox/2}" y="-80" font-size="36" font-weight="bold" fill="#2e7d32" text-anchor="middle">FRONT (Podział zewnętrzny)</text>`; 
                
                subCabinets.forEach((cab, i) => {
                    let baseF = hBox - cab.startY - cab.visualGap;
                    
                    svg += `<line x1="${sXFront - 50}" y1="${baseF}" x2="${sXFront + wBox + 150}" y2="${baseF}" stroke="#2e7d32" stroke-width="3" stroke-dasharray="8,8" opacity="0.6"/><text x="${sXFront + wBox + 160}" y="${baseF + 8}" font-size="${fontL}" font-weight="bold" fill="#2e7d32" text-anchor="start">0 mm (BAZA WNĘTRZA${subCabinets.length > 1 ? ` MODUŁU ${i+1}` : ''})</text>`; 
                    
                    let blocksInCab = frontBlocks.filter(fb => fb.visualGap === cab.visualGap && fb.layout !== 'none');
                    if (blocksInCab.length > 0) {
                        let minStart = Math.min(...blocksInCab.map(b => b.yStart));
                        let maxEnd = Math.max(...blocksInCab.map(b => b.yEnd));
                        let totalFacadeH = maxEnd - minStart;
                        let topY = hBox - maxEnd - cab.visualGap;
                        let bottomY = hBox - minStart - cab.visualGap;
                        
                        let dimTotalX = sXFront - 110;
                        svg += `<line x1="${dimTotalX}" y1="${topY}" x2="${dimTotalX}" y2="${bottomY}" stroke="#1b5e20" stroke-width="2" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>`;
                        svg += `<rect x="${dimTotalX - 35}" y="${topY + totalFacadeH/2 - 16}" width="70" height="32" fill="#ffffff" stroke="#1b5e20" stroke-width="1.5" rx="4"/>`;
                        svg += `<text x="${dimTotalX}" y="${topY + totalFacadeH/2 + 7}" font-size="${fontM}" font-weight="bold" fill="#1b5e20" text-anchor="middle">${formatDim(totalFacadeH)}</text>`;
                    }
                });
                 
                frontBlocks.forEach(fb => { 
                    if (fb.layout === 'none') return; 

                    let rectTopY = hBox - fb.yEnd - fb.visualGap; let rectH = fb.yEnd - fb.yStart; 
                    
                    let dimX = sXFront - 45;
                    svg += `<line x1="${dimX}" y1="${rectTopY}" x2="${dimX}" y2="${rectTopY + rectH}" stroke="#2e7d32" stroke-width="1.5" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)"/>`;
                    svg += `<rect x="${dimX - 30}" y="${rectTopY + rectH/2 - 14}" width="60" height="28" fill="#ffffff" stroke="#2e7d32" stroke-width="1" rx="4"/>`;
                    svg += `<text x="${dimX}" y="${rectTopY + rectH/2 + 6}" font-size="${fontS}" font-weight="bold" fill="#2e7d32" text-anchor="middle">${formatDim(rectH)}</text>`;

                    let fFullW = (wBox - 2*tBoard) + fb.nL + fb.nR;
                    let leftX = sXFront + tBoard - fb.nL;
                    let halfW = (fFullW - fb.gap) / 2;

                    let rects = [];
                    if (fb.layout === 'full') rects.push({ x: leftX, w: fFullW, hinge: 'left' });
                    else if (fb.layout === 'left') rects.push({ x: leftX, w: halfW, hinge: 'left' });
                    else if (fb.layout === 'right') rects.push({ x: leftX + halfW + fb.gap, w: halfW, hinge: 'right' });
                    else if (fb.layout === 'double') {
                        rects.push({ x: leftX, w: halfW, hinge: 'left' });
                        rects.push({ x: leftX + halfW + fb.gap, w: halfW, hinge: 'right' });
                    }

                    if(fb.type === 'door') { 
                        rects.forEach(r => {
                            svg += `<rect x="${r.x}" y="${rectTopY}" width="${r.w}" height="${rectH}" fill="#e2efda" stroke="#2e7d32" stroke-width="${lineW}"/>`;
                            let zawInfo = fb.actualZawCount > 0 ? ` (${fb.actualZawCount} zaw.)` : ``;
                            svg += `<text x="${r.x + r.w/2}" y="${rectTopY + rectH/2 + 8}" font-size="${fontM}" font-weight="bold" fill="#2e7d32" text-anchor="middle">Front: ${formatDim(rectH)} mm${zawInfo}</text>`;
                        });

                        fb.hinges.forEach(zaw => { 
                            let cy = hBox - zaw.bodyY - zaw.visualGap; let color = zaw.shifted ? "#9c27b0" : "#2e7d32"; 
                            
                            if (fb.layout === 'full' || fb.layout === 'left' || fb.layout === 'double') {
                                let puszkaX = leftX + 22;  
                                svg += `<circle cx="${puszkaX}" cy="${cy}" r="17.5" fill="none" stroke="${color}" stroke-width="3"/><circle cx="${puszkaX}" cy="${cy}" r="3" fill="${color}"/>`;
                                svg += `<line x1="${puszkaX}" y1="${cy}" x2="${sXFront + wBox + 60}" y2="${cy}" stroke="${color}" stroke-dasharray="4,4" stroke-width="2"/>`;
                                if (fb.layout !== 'double') {
                                    svg += `<text x="${sXFront + wBox + 70}" y="${cy + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${formatDim(zaw.frontY)} (${formatDim(rectH - zaw.frontY)})${zaw.shifted ? " [KOREKTA]" : ""}</text>`; 
                                }
                            }
                            if (fb.layout === 'right' || fb.layout === 'double') {
                                let puszkaX = leftX + fFullW - 22;
                                svg += `<circle cx="${puszkaX}" cy="${cy}" r="17.5" fill="none" stroke="${color}" stroke-width="3"/><circle cx="${puszkaX}" cy="${cy}" r="3" fill="${color}"/>`;
                                svg += `<line x1="${puszkaX}" y1="${cy}" x2="${sXFront + wBox + 60}" y2="${cy}" stroke="${color}" stroke-dasharray="4,4" stroke-width="2"/>`;
                                svg += `<text x="${sXFront + wBox + 70}" y="${cy + 8}" font-size="${fontL}" font-weight="bold" fill="${color}" text-anchor="start">${formatDim(zaw.frontY)} (${formatDim(rectH - zaw.frontY)})${zaw.shifted ? " [KOREKTA]" : ""}</text>`;
                            }
                        }); 
                    } else if(fb.type === 'drawers') { 
                        fb.drawers.forEach((dr, idx) => { 
                            let drH = dr.yEnd - dr.yStart; 
                            
                            rects.forEach(r => {
                                svg += `<rect x="${r.x}" y="${hBox - dr.yEnd - fb.visualGap}" width="${r.w}" height="${drH}" fill="#e8f0fe" stroke="#1F4E79" stroke-width="${lineW}"/>`; 
                                let drTypeLabel = ""; 
                                if (fb.drawerMode === 'manual' && fb.manualFronts[idx]) { 
                                    let tObj = sysDB.types.find(t => t.id === fb.manualFronts[idx].type); 
                                    if(tObj) drTypeLabel = ` [Typ: ${tObj.label}]`; 
                                } 
                                svg += `<text x="${r.x + r.w/2}" y="${hBox - dr.yEnd - fb.visualGap + drH/2 + 8}" font-size="${fontS}" font-weight="bold" fill="#1F4E79" text-anchor="middle">Szuf. ${idx+1} (F: ${formatDim(drH)}mm)${drTypeLabel}</text>`; 
                            });
                        }); 
                    } 
                }); 
            }

            svg += `</svg>`; 
            document.getElementById('svgWrapper').innerHTML = svg; 

            // ODŚWIEŻENIE WIDOKU 3D
            update3DScene();
        } 
 
        window.onload = () => { 
            initZoomPan(); 
            run(); 
            renderSavedCabinets(); 
            toggleAutoZaw(); 
            toggleBackFields(); 
        }; 
    </script> 
</body> 
</html>
